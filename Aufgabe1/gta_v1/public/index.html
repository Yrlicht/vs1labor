<!DOCTYPE html>

<!-- File origin: VS1LAB A1a -->

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTagApp</title>
    <link rel="stylesheet" href="./stylesheets/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    

    <header class="header">
        <img src="./images/location.png" class="header__image" alt="an image of a map and location">
        <h1 class="header__title">GeoTagApp</h1>
        <nav class="header__navigation">
            <a href="#">About</a> | <a href="#">Help</a> | <a href="/">Home</a>
        </nav>
    </header>

    <main class="main">
        <div class="row">
        <section class="main__tagging tagging col-3">
            <h2>Tagging</h2>

            <!-- ############### VS1Lab 1a Form 1 Start -->
             <fieldset>
                <legend>Add a new GeoTag</legend>
                <form id="tag-form" action="/tagging" method="post">

          
                 <div class="Latitude">
                    <label for="Latitude">Latitude</label>
                    <input type="text" id="Latitude" name="Latitude" placeholder="67.6767">
                    </div>
                <div class="Longitude">  
                    <label for="Longitude">Longitude</label>
                     <input type="text" id="Longitude" name="Latitude" placeholder="67.6767">
                    </div> 
                

                
                <div class="Name">
                    <label for="Name">Name</label>
                    <input type="text" id="Name" name="Name" placeholder="max. 10 Buchstaben" maxlength="10" required>
                    </div>
                <div class="Hashtag">
                    <label for="Hashtag">Hashtag (optional)</label>
                    <input type="text" id="Hashtag" name="Hashtag" pattern=".*#.*" placeholder="max. 10 Buchstaben" maxlength="10">
                    </div> 
                 

                <button class="submit">
                    Add Tag
                </button>
                    


            </form>
            </fieldset>
            <!-- ############### VS1Lab 1a Form 1 End -->

        </section>

        <section class="main__discovery discovery">
            <h2 class="discovery__title">Discovery</h2>

            <!-- ############### VS1Lab 1a Form 2 Start -->
            <fieldset>
                <legend>Search</legend>
            <form class="discovery__search" id="discoveryFilterForm" action="/discovery" method="post">

                <!-- ... your code here ... -->
                <div class="Searchterm">
                    <label for="Searchterm">Search term or keywords</label>
                    <input type="text" id="Search" name="Search term" placeholder="e.g. Honolulu">
                    </div>
                <div class="Latitude">
                    <label for="hidden" name="Latitude"></label>
                    </div>
                <div class="Longitude">
                    <label for="hidden" name="Longitude"></label>                  
                    </div>
                <button class="submit">
                    Search
                </button>



            </form>
            </fieldset>
            <!-- ############### VS1Lab 1a Form 2 End -->

            <div class="discovery__wrapper">
                <div class="discovery__taglist">
                    <ul class="discovery__results" id="discoveryResults">
                        <li>Castle (49.01379, 8.404435) #sight</li>
                        <li>IWI (49.01379, 8.390071) #edu</li>
                    </ul>
                </div>

                <div id="map" class="discovery__map">
                    <img src="./images/mapview.jpg" alt="a map with locations" id="mapView" />
                    <span>Result map</span>
                </div>
            </div>
        </section>
        </div>
    </main>

    <footer class="footer">
        <span>(c) 2021/22 HKA_IWI_VSYS</span>
    </footer>
</body>

</html>
